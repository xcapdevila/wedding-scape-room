<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Mots Encreuats — Casament Xavier &amp; Meritxell</title>
<style>
  @page {
    size: 594mm 420mm; /* A2 landscape */
    margin: 12mm;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 594mm;
    height: 420mm;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #1a1a1a;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    overflow: hidden;
  }
  body {
    padding: 10mm;
    display: flex;
    flex-direction: column;
    height: 420mm;
    max-height: 420mm;
  }

  /* Title */
  .header {
    text-align: center;
    margin-bottom: 6mm;
  }
  .header h1 {
    font-size: 30pt;
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 1.5mm;
  }
  .header .subtitle {
    font-size: 13pt;
    font-style: italic;
    color: #555;
  }

  /* Main layout: grid left, clues right */
  .main {
    flex: 1;
    display: flex;
    gap: 10mm;
    align-items: center;
  }

  /* Grid side */
  .grid-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4mm;
  }
  table.grid {
    border-collapse: collapse;
  }
  table.grid td {
    width: 13.5mm;
    height: 13.5mm;
    text-align: center;
    vertical-align: middle;
    font-size: 9pt;
    font-weight: bold;
    position: relative;
    border: none;
  }
  table.grid td.letter {
    border: 1.2pt solid #222;
    background: #fff;
  }
  table.grid td.black {
    background: #fff;
    border: none;
  }
  table.grid td .clue-num {
    position: absolute;
    top: 0.5mm;
    left: 1mm;
    font-size: 7.5pt;
    font-weight: 800;
    color: #000;
    line-height: 1;
  }
  /* Cell letters (hints) */
  table.grid td .cell-letter {
    font-size: 9pt;
    font-weight: 800;
    color: #222;
  }

  /* Colored cells */
  td.color-green { background: #a8d5a2 !important; border-width: 2.5pt !important; }
  td.color-blue  { background: #a2c4d5 !important; border-width: 2.5pt !important; }
  td.color-red   { background: #d5a2a2 !important; border-width: 2.5pt !important; }

  /* Clues side */
  .clues-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12mm;
  }
  .clues-col h2 {
    font-size: 15pt;
    border-bottom: 1.5pt solid #222;
    padding-bottom: 1.5mm;
    margin-bottom: 3mm;
    letter-spacing: 1.5px;
  }
  .clue-item {
    font-size: 12pt;
    line-height: 1.5;
    margin-bottom: 2mm;
    text-indent: -6mm;
    padding-left: 6mm;
  }
  .clue-item .num {
    font-weight: 700;
    margin-right: 1.5mm;
  }
  .clue-item .lang-tag {
    font-style: italic;
    color: #777;
  }

  @media print {
    body { padding: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>ON ÉS EL SEATING PLAN?</h1>
  <div class="subtitle">Casament Xavier &amp; Meritxell · 25 d'abril de 2026</div>
</div>

<div class="main">
  <!-- Left: Grid + legend -->
  <div class="grid-side">
    <table class="grid" id="grid"></table>
  </div>

  <!-- Right: Clues -->
  <div class="clues-side">
    <div class="clues-col" id="clues-h"></div>
    <div class="clues-col" id="clues-v"></div>
  </div>
</div>

<script>
const GRID_RAW = [
  ".........................F",
  ".........................R",
  "......................O..A",
  "......................L..K",
  "......................E..T",
  ".................ECOGRAFIA",
  ".................N....R..L",
  ".................TURISTAS.",
  ".................R........",
  "...........F.MIGUEL.......",
  "........ORXATA...C........",
  "...........R.S...O........",
  ".....V..C..R.E.M.T........",
  "....BARRANQUILLO..L.......",
  ".....L..Z....L.J..L.......",
  "P....E.GUIX.BASIC.U.......",
  "AMAZON..E......T..V.......",
  "Y....C..L.R...COMPI.......",
  "M...AIRBIKE...B...A.......",
  "E....A..T.C...M...........",
  "N......NADAL..A...........",
  "T.........R...N...........",
  "S.........E...R...........",
  "..........D...E...........",
  "..........O...S...........",
  "..............A...........",
];

const COLORED_CELLS = [
  { r: 4,  c: 25, color: "green" },
  { r: 21, c: 10, color: "green" },
  { r: 19, c: 0,  color: "green" },
  { r: 11, c: 13, color: "green" },
  { r: 16, c: 5,  color: "blue" },
  { r: 13, c: 15, color: "blue" },
  { r: 15, c: 8,  color: "blue" },
  { r: 16, c: 18, color: "red" },
  { r: 7,  c: 18, color: "red" },
  { r: 9,  c: 14, color: "red" },
  { r: 10, c: 12, color: "red" },
];
const COLOR_MAP = {};
COLORED_CELLS.forEach(cc => { COLOR_MAP[`${cc.r},${cc.c}`] = cc.color; });

const PLACEMENTS = [
  { word: "ECOGRAFIA",    r: 5,  c: 17, dir: "H" },
  { word: "TURISTAS",     r: 7,  c: 17, dir: "H" },
  { word: "MIGUEL",       r: 9,  c: 13, dir: "H" },
  { word: "ORXATA",       r: 10, c: 8,  dir: "H" },
  { word: "BARRANQUILLO", r: 13, c: 4,  dir: "H" },
  { word: "GUIX",         r: 15, c: 7,  dir: "H" },
  { word: "BASIC",        r: 15, c: 12, dir: "H" },
  { word: "AMAZON",       r: 16, c: 0,  dir: "H" },
  { word: "NADAL",        r: 20, c: 7,  dir: "H" },
  { word: "COMPI",        r: 17, c: 14, dir: "H" },
  { word: "ENTRECOT",     r: 5,  c: 17, dir: "V" },
  { word: "MASELLA",      r: 9,  c: 13, dir: "V" },
  { word: "FRAKTAL",      r: 0,  c: 25, dir: "V" },
  { word: "OLEART",       r: 2,  c: 22, dir: "V" },
  { word: "PAYMENTS",     r: 15, c: 0,  dir: "V" },
  { word: "CAZUELITA",    r: 12, c: 8,  dir: "V" },
  { word: "VALENCIA",     r: 12, c: 5,  dir: "V" },
  { word: "LLUVIA",       r: 13, c: 18, dir: "V" },
  { word: "FARRU",        r: 9,  c: 11, dir: "V" },
  { word: "MOJITO",       r: 12, c: 15, dir: "V" },
  { word: "AIRBIKE",      r: 18, c: 4,  dir: "H" },
  { word: "RECAREDO",     r: 17, c: 10, dir: "V" },
  { word: "CBMANRESA",    r: 17, c: 14, dir: "V" },
];

const CLUES_CA = {
  H: [
    { word: "ECOGRAFIA", wordLang: "ca", text: "Sens dubte és el futur" },
    { word: "TURISTAS", wordLang: "es", text: "Com ens anomenem des de la pitjor caixa forta de la història" },
    { word: "MIGUEL", wordLang: null, text: "Nom que anomenes al Collbaix i automàticament et fots de cap" },
    { word: "ORXATA", wordLang: "ca", text: "Beguda d'estiu que es va pujar fins a dalt del Canigó" },
    { word: "BARRANQUILLO", wordLang: "es", text: "Per on et venen ganes de tirar-te en moments crítics quan fas muntanya" },
    { word: "GUIX", wordLang: "ca", text: "Lloc a les afores de Manresa on la Meritxell ha passat gran part de la seva infantesa" },
    { word: "BASIC", wordLang: null, text: "Bar musical on el Xavi es va conèixer amb un dels convidats (a part de passar-s'hi mooooooooltes tardes i nits)" },
    { word: "AMAZON", wordLang: null, text: "D'on era el paquet que es va rebre sortint de la dutxa" },
    { word: "NADAL", wordLang: null, text: "Esperem tot l'any per a que arribi" },
    { word: "COMPI", wordLang: "es", text: "Expressió lúdico-afectiva per a referir-se a un company de feina a Inditex" },
    { word: "AIRBIKE", wordLang: null, text: "L'infern disfressat de bicicleta" },
  ],
  V: [
    { word: "ENTRECOT", wordLang: null, text: "Clàssic que mai falla en un dinar de masia" },
    { word: "MASELLA", wordLang: null, text: "L'estació d'esquí per defecte" },
    { word: "FRAKTAL", wordLang: null, text: "Formació clàssica de la makina catalana que ha tornat amb molta \"Actitut\"" },
    { word: "OLEART", wordLang: null, text: "DJ incombustible que organitza festes que ens permeten tornar al passat" },
    { word: "PAYMENTS", wordLang: "en", text: "Unitat de negoci en la que treballa en Xavi" },
    { word: "CAZUELITA", wordLang: "es", text: "Utensili de cuina on el Xavi menjava els dinars que li feia la seva àvia" },
    { word: "VALENCIA", wordLang: null, text: "Radio on va tenir resó mediàtic el club de fans de Take That de dues adolescents que avui ens acompanyen" },
    { word: "LLUVIA", wordLang: "es", text: "Inclemència meteorològica que es dona quan ens ajuntem (excepte si anem a un \"resort\")" },
    { word: "FARRU", wordLang: "ca", text: "Personatge que regenta el bar més xungo de tot Manresa" },
    { word: "MOJITO", wordLang: null, text: "Còctel pel que sempre estem a punt, sobretot després d'un dia de platja" },
    { word: "RECAREDO", wordLang: null, text: "Caves que hem tingut la sort de conèixer en profunditat (amb pedal inclòs)" },
    { word: "CBMANRESA", wordLang: null, text: "Club de bàsquet on la Meritxell es va conèixer amb una de les convidades" },
  ],
};

// Compute clue numbers
function computeClueNumbers() {
  const startCells = {};
  PLACEMENTS.forEach(p => {
    const key = `${p.r},${p.c}`;
    if (!startCells[key]) startCells[key] = [];
    startCells[key].push(p);
  });
  const sorted = Object.keys(startCells).sort((a, b) => {
    const [ar, ac] = a.split(",").map(Number);
    const [br, bc] = b.split(",").map(Number);
    return ar !== br ? ar - br : ac - bc;
  });
  const numberMap = {};
  let num = 1;
  sorted.forEach(key => {
    numberMap[key] = num;
    startCells[key].forEach(p => { p.num = num; });
    num++;
  });
  return numberMap;
}
const NUMBER_MAP = computeClueNumbers();

// Seeded PRNG (mulberry32) — same seed = same hints as the web version
function seededRandom(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function buildCellWordMap() {
  const cellWords = {};
  PLACEMENTS.forEach(p => {
    const len = p.word.length;
    for (let i = 0; i < len; i++) {
      const r = p.dir === "H" ? p.r : p.r + i;
      const c = p.dir === "H" ? p.c + i : p.c;
      const key = `${r},${c}`;
      if (!cellWords[key]) cellWords[key] = [];
      cellWords[key].push({ word: p.word, len, dir: p.dir });
    }
  });
  return cellWords;
}
const CELL_WORD_MAP = buildCellWordMap();

function computeHintSet(hintPercent, seed) {
  const rng = seededRandom(seed);
  const hintable = [];
  for (let r = 0; r < GRID_RAW.length; r++) {
    for (let c = 0; c < GRID_RAW[r].length; c++) {
      const ch = GRID_RAW[r][c];
      const key = `${r},${c}`;
      if (ch !== "." && !COLOR_MAP[key]) {
        hintable.push({ r, c, ch, key });
      }
    }
  }
  for (let i = hintable.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [hintable[i], hintable[j]] = [hintable[j], hintable[i]];
  }
  const targetCount = Math.round((hintPercent / 100) * hintable.length);
  const hintSet = new Set();
  const wordHintCount = {};
  for (const cell of hintable) {
    if (hintSet.size >= targetCount) break;
    const words = CELL_WORD_MAP[cell.key] || [];
    let allowed = true;
    for (const w of words) {
      const wKey = `${w.word}_${w.dir}`;
      const current = wordHintCount[wKey] || 0;
      const maxHints = w.len <= 5 ? 1 : 2;
      if (current >= maxHints) { allowed = false; break; }
    }
    if (allowed) {
      hintSet.add(cell.key);
      for (const w of words) {
        const wKey = `${w.word}_${w.dir}`;
        wordHintCount[wKey] = (wordHintCount[wKey] || 0) + 1;
      }
    }
  }
  return hintSet;
}
const HINT_SET = computeHintSet(30, 2026);

// Render grid
const ROWS = GRID_RAW.length;
const COLS = GRID_RAW[0].length;
const table = document.getElementById("grid");
for (let r = 0; r < ROWS; r++) {
  const tr = document.createElement("tr");
  for (let c = 0; c < COLS; c++) {
    const ch = GRID_RAW[r][c];
    const td = document.createElement("td");
    const key = `${r},${c}`;
    if (ch === ".") {
      td.className = "black";
    } else {
      td.className = "letter";
      const color = COLOR_MAP[key];
      if (color) td.classList.add("color-" + color);
      if (NUMBER_MAP[key]) {
        const span = document.createElement("span");
        span.className = "clue-num";
        span.textContent = NUMBER_MAP[key];
        td.appendChild(span);
      }
      // Show letter if it's a hint cell (same as player view)
      if (HINT_SET.has(key)) {
        const letterSpan = document.createElement("span");
        letterSpan.className = "cell-letter";
        letterSpan.textContent = ch;
        td.appendChild(letterSpan);
      }
    }
    tr.appendChild(td);
  }
  table.appendChild(tr);
}

// Render clues (only Catalan)
function renderClues(dir, containerId) {
  const container = document.getElementById(containerId);
  const title = dir === "H" ? "HORITZONTALS" : "VERTICALS";
  container.innerHTML = `<h2>${title}</h2>`;

  const clues = CLUES_CA[dir].map(c => {
    const p = PLACEMENTS.find(p => p.word === c.word && p.dir === dir);
    return { ...c, num: p ? p.num : 0 };
  }).sort((a, b) => a.num - b.num);

  clues.forEach(c => {
    const div = document.createElement("div");
    div.className = "clue-item";
    let text = c.text;
    if (c.wordLang && c.wordLang !== "ca") {
      const tags = { es: "en castellà", en: "en anglès" };
      if (tags[c.wordLang]) text += ` <span class="lang-tag">[${tags[c.wordLang]}]</span>`;
    }
    div.innerHTML = `<span class="num">${c.num}.</span> ${text}`;
    container.appendChild(div);
  });
}

renderClues("H", "clues-h");
renderClues("V", "clues-v");
</script>
</body>
</html>
